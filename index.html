<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>教學紀錄</title>
<style>
:root {
  --bg: #f5f0eb;
  --card: #ffffff;
  --primary: #3d6b8e;
  --primary-light: #e8f0f7;
  --accent: #e07b4f;
  --accent-light: #fdf0ea;
  --green: #4a8c6f;
  --green-light: #e8f5ef;
  --text: #2a2a2a;
  --text-soft: #666;
  --border: #e0d8d0;
  --radius: 14px;
  --shadow: 0 2px 16px rgba(0,0,0,0.08);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, 'PingFang TC', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 16px; }
header { text-align: center; padding: 20px 0 16px; }
header h1 { font-size: 22px; font-weight: 700; color: var(--primary); letter-spacing: 2px; }
header p { font-size: 13px; color: var(--text-soft); margin-top: 4px; }
.tabs { display: flex; gap: 8px; margin-bottom: 16px; }
.tab-btn { flex: 1; padding: 12px; border: 1.5px solid var(--border); border-radius: 10px; background: white; font-size: 15px; font-weight: 700; font-family: inherit; color: var(--text-soft); cursor: pointer; }
.tab-btn.active { background: var(--primary); border-color: var(--primary); color: white; }
.card { background: var(--card); border-radius: var(--radius); padding: 20px; margin-bottom: 14px; box-shadow: var(--shadow); border: 1px solid var(--border); }
.section-label { font-size: 11px; font-weight: 700; letter-spacing: 2px; color: var(--text-soft); margin-bottom: 12px; }
.field { margin-bottom: 16px; }
.field:last-child { margin-bottom: 0; }
label { display: block; font-size: 13px; font-weight: 600; color: var(--text-soft); margin-bottom: 6px; }
input[type="text"], input[type="number"], select, textarea {
  width: 100%; padding: 12px 14px; border: 1.5px solid var(--border); border-radius: 10px;
  font-size: 16px; font-family: inherit; background: #fafaf8; color: var(--text);
  appearance: none; -webkit-appearance: none;
}
input:focus, select:focus, textarea:focus { outline: none; border-color: var(--primary); background: white; }
.btn-group { display: flex; flex-wrap: wrap; gap: 8px; }
.btn-opt {
  flex: 1; min-width: 80px; padding: 10px 8px; border: 1.5px solid var(--border);
  border-radius: 10px; background: #fafaf8; font-size: 14px; font-family: inherit;
  color: var(--text); cursor: pointer; text-align: center; font-weight: 500;
}
.btn-opt.sel { background: var(--primary); border-color: var(--primary); color: white; font-weight: 600; }
.btn-opt.sel-green { background: var(--green); border-color: var(--green); color: white; font-weight: 600; }
.btn-opt.sel-accent { background: var(--accent); border-color: var(--accent); color: white; font-weight: 600; }
.fraction-input { display: flex; align-items: center; gap: 8px; }
.fraction-input input { flex: 1; text-align: center; }
.slash { font-size: 20px; color: var(--text-soft); font-weight: 300; }
.subject-block { background: var(--primary-light); border-radius: 12px; padding: 16px; margin-top: 4px; }
.subject-block.math { background: var(--accent-light); }
.ex-item { background: white; border-radius: 10px; padding: 14px; margin-bottom: 10px; border: 1px solid var(--border); }
.ex-item:last-child { margin-bottom: 0; }
.ex-title { font-size: 14px; font-weight: 600; margin-bottom: 10px; }
.math-item { background: white; border-radius: 10px; padding: 14px; margin-bottom: 10px; border: 1px solid var(--border); }
.math-item-title { font-size: 13px; color: var(--text-soft); margin-bottom: 8px; font-weight: 500; }
.chk-row { display: flex; align-items: center; gap: 10px; }
.chk-row input[type="checkbox"] { width: 20px; height: 20px; accent-color: var(--primary); flex-shrink: 0; }
.chk-row label { margin: 0; font-size: 15px; font-weight: 500; cursor: pointer; }
.submit-btn {
  width: 100%; padding: 16px; background: var(--primary); color: white; border: none;
  border-radius: var(--radius); font-size: 17px; font-weight: 700; font-family: inherit;
  letter-spacing: 1px; cursor: pointer; margin-top: 8px;
}
.submit-btn:disabled { background: #aaa; }
.divider { height: 1px; background: var(--border); margin: 16px 0; }
.hidden { display: none !important; }
.toast {
  position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px);
  background: var(--green); color: white; padding: 14px 28px; border-radius: 100px;
  font-size: 15px; font-weight: 600; transition: transform 0.3s ease; z-index: 999; white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.error { background: #c0392b; }
#noteModal {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5);
  z-index: 100; align-items: flex-end; justify-content: center;
}
#noteModalInner {
  background: white; width: 100%; max-width: 480px;
  border-radius: 20px 20px 0 0; padding: 24px 20px 36px;
}
</style>
</head>
<body>

<header>
  <h1>📚 教學紀錄</h1>
  <p>巡迴輔導記錄系統</p>
</header>

<div class="tabs">
  <button class="tab-btn active" id="tab-record" onclick="switchTab('record')">✏️ 記錄</button>
  <button class="tab-btn" id="tab-query" onclick="switchTab('query')">🔍 查詢</button>
</div>

<!-- 記錄頁面 -->
<div id="page-record">

<div class="card">
  <div class="section-label">基本資訊</div>
  <div class="field">
    <label>週次</label>
    <input type="text" id="weekNum" placeholder="例：第10週">
  </div>
  <div class="field">
    <label>日期</label>
    <input type="text" id="dateField" readonly>
  </div>
  <div class="field">
    <label>學校</label>
    <div class="btn-group">
      <button class="btn-opt" onclick="selectSchool('SL', this)">SL</button>
      <button class="btn-opt" onclick="selectSchool('SDA', this)">SDA</button>
    </div>
  </div>
  <div class="field hidden" id="studentField">
    <label>學生</label>
    <select id="studentSelect" onchange="onStudentChange()">
      <option value="">請選擇學生</option>
    </select>
  </div>
  <div class="field hidden" id="gradeField">
    <label>年級</label>
    <input type="text" id="gradeText" readonly>
  </div>
</div>

<div class="card hidden" id="subjectCard">
  <div class="section-label">科目</div>
  <div class="btn-group">
    <button class="btn-opt" onclick="selectSubject('國語', this)">📖 國語</button>
    <button class="btn-opt" onclick="selectSubject('數學', this)">🔢 數學</button>
  </div>
</div>

<!-- 國語 -->
<div class="card hidden" id="chineseCard">
  <div class="section-label">國語內容</div>
  <div class="subject-block">
    <div class="field">
      <label>課次</label>
      <select id="lessonSelect"></select>
    </div>
    <div class="divider"></div>
    <div id="normalExercises">
      <div class="ex-item">
        <div class="chk-row"><input type="checkbox" id="chk-writing" onchange="toggleEx('writing')"><label for="chk-writing">生字書寫</label></div>
        <div id="det-writing" class="hidden" style="padding-top:10px">
          <div class="fraction-input">
            <input type="number" id="writing-c" placeholder="答對" min="0">
            <span class="slash">/</span>
            <input type="number" id="writing-t" placeholder="總題" min="0">
          </div>
        </div>
      </div>
      <div class="ex-item">
        <div class="chk-row"><input type="checkbox" id="chk-vocab" onchange="toggleEx('vocab')"><label for="chk-vocab">語詞解釋</label></div>
        <div id="det-vocab" class="hidden" style="padding-top:10px">
          <div class="fraction-input">
            <input type="number" id="vocab-c" placeholder="答對" min="0">
            <span class="slash">/</span>
            <input type="number" id="vocab-t" placeholder="總題" min="0">
          </div>
        </div>
      </div>
      <div class="ex-item">
        <div class="chk-row"><input type="checkbox" id="chk-match" onchange="toggleEx('match')"><label for="chk-match">語詞配對</label></div>
        <div id="det-match" class="hidden" style="padding-top:10px">
          <div class="fraction-input">
            <input type="number" id="match-c" placeholder="答對" min="0">
            <span class="slash">/</span>
            <input type="number" id="match-t" placeholder="總題" min="0">
          </div>
        </div>
      </div>
    </div>
    <div class="ex-item">
      <div class="chk-row"><input type="checkbox" id="chk-sentence" onchange="toggleEx('sentence')"><label for="chk-sentence">造句</label></div>
      <div id="det-sentence" class="hidden" style="padding-top:10px">
        <div class="btn-group" id="sentenceGroup">
          <button class="btn-opt" onclick="setSentence('獨力完成', this)">獨力完成</button>
          <button class="btn-opt" onclick="setSentence('引導完成', this)">引導完成</button>
        </div>
      </div>
    </div>
    <div class="ex-item" id="ex-reading">
      <div class="chk-row"><input type="checkbox" id="chk-reading" onchange="toggleEx('reading')"><label for="chk-reading">課文理解測驗</label></div>
      <div id="det-reading" class="hidden" style="padding-top:10px">
        <div class="fraction-input">
          <input type="number" id="reading-c" placeholder="答對" min="0">
          <span class="slash">/</span>
          <input type="number" id="reading-t" placeholder="總題" min="0">
        </div>
      </div>
    </div>
    <!-- 鄭生專屬 -->
    <div class="ex-item hidden" id="ex-charPractice">
      <div class="chk-row"><input type="checkbox" id="chk-charPractice" onchange="toggleEx('charPractice')"><label for="chk-charPractice">常用字認字</label></div>
      <div id="det-charPractice" class="hidden" style="padding-top:10px">
        <input type="text" id="charPractice-unit" placeholder="單元名稱" style="margin-bottom:8px">
        <div class="fraction-input">
          <input type="number" id="charPractice-c" placeholder="答對" min="0">
          <span class="slash">/</span>
          <input type="number" id="charPractice-t" placeholder="總題" min="0">
        </div>
      </div>
    </div>
    <!-- 一年級專屬國語 -->
    <div id="grade1ChBlock" class="hidden">
      <div class="divider"></div>
      <div class="field">
        <label>課次</label>
        <select id="grade1LessonSelect"></select>
      </div>
      <div class="math-item">
        <div class="math-item-title">注音符號（可複選）</div>
        <div class="btn-group" style="flex-wrap:wrap;margin-bottom:8px">
          <button class="btn-opt" onclick="toggleZhuyin('37個符號',this)" style="min-width:80px;flex:none">37個符號</button>
          <button class="btn-opt" onclick="toggleZhuyin('結合韻雙拼',this)" style="min-width:80px;flex:none">結合韻雙拼</button>
          <button class="btn-opt" onclick="toggleZhuyin('結合韻三拼',this)" style="min-width:80px;flex:none">結合韻三拼</button>
          <button class="btn-opt" onclick="toggleZhuyin('聲調',this)" style="min-width:80px;flex:none">聲調</button>
        </div>
        <div class="btn-group" id="zhuyinRatingGroup">
          <button class="btn-opt" onclick="setG1Ch('zhuyin','良好',this)">良好</button>
          <button class="btn-opt" onclick="setG1Ch('zhuyin','尚可',this)">尚可</button>
          <button class="btn-opt" onclick="setG1Ch('zhuyin','加油',this)">加油</button>
        </div>
      </div>
      <div class="math-item"><div class="math-item-title">語詞 讀</div><div class="btn-group"><button class="btn-opt" onclick="setG1Ch('vocabRead','良好',this)">良好</button><button class="btn-opt" onclick="setG1Ch('vocabRead','尚可',this)">尚可</button><button class="btn-opt" onclick="setG1Ch('vocabRead','加油',this)">加油</button></div></div>
      <div class="math-item"><div class="math-item-title">生字 讀</div><div class="btn-group"><button class="btn-opt" onclick="setG1Ch('charRead','良好',this)">良好</button><button class="btn-opt" onclick="setG1Ch('charRead','尚可',this)">尚可</button><button class="btn-opt" onclick="setG1Ch('charRead','加油',this)">加油</button></div></div>
      <div class="math-item"><div class="math-item-title">生字 寫</div><div class="btn-group"><button class="btn-opt" onclick="setG1Ch('charWrite','良好',this)">良好</button><button class="btn-opt" onclick="setG1Ch('charWrite','尚可',this)">尚可</button><button class="btn-opt" onclick="setG1Ch('charWrite','加油',this)">加油</button></div></div>
      <div class="math-item"><div class="math-item-title">課文跟讀</div><div class="btn-group"><button class="btn-opt" onclick="setG1Ch('textFollow','良好',this)">良好</button><button class="btn-opt" onclick="setG1Ch('textFollow','尚可',this)">尚可</button><button class="btn-opt" onclick="setG1Ch('textFollow','加油',this)">加油</button></div></div>
      <div class="math-item"><div class="math-item-title">課文理解</div><div class="btn-group"><button class="btn-opt" onclick="setG1Ch('textComp','良好',this)">良好</button><button class="btn-opt" onclick="setG1Ch('textComp','尚可',this)">尚可</button><button class="btn-opt" onclick="setG1Ch('textComp','加油',this)">加油</button></div></div>
      <div class="math-item"><div class="math-item-title">句型練習</div><div class="btn-group"><button class="btn-opt" onclick="setG1Ch('sentence','良好',this)">良好</button><button class="btn-opt" onclick="setG1Ch('sentence','尚可',this)">尚可</button><button class="btn-opt" onclick="setG1Ch('sentence','加油',this)">加油</button></div></div>
    </div>
  </div>
</div>

<!-- 數學 -->
<div class="card hidden" id="mathCard">
  <div class="section-label">數學內容</div>
  <div class="subject-block math">
    <div id="normalMathBlock">
      <div class="field">
        <label>單元</label>
        <select id="mathUnitSelect" onchange="onMathUnitChange()"></select>
      </div>
      <div id="mathSubItems" class="hidden">
        <div class="divider"></div>
        <label style="font-size:13px;font-weight:600;color:var(--text-soft);margin-bottom:10px;display:block">各細項熟練度</label>
        <div id="mathSubList"></div>
      </div>
    </div>
    <!-- 一年級數學 -->
    <div id="grade1MathBlock" class="hidden">
      <div class="field">
        <label>單元</label>
        <select id="grade1MathUnit">
          <option value="">請選擇單元</option>
          <option>第1單元 20以內的加法</option>
          <option>第2單元 長度</option>
          <option>第3單元 20以內的減法</option>
          <option>第4單元 100以內的數</option>
          <option>第5單元 形狀與形體</option>
          <option>第6單元 數數看有多少元</option>
          <option>第7單元 幾月幾日星期幾</option>
          <option>第8單元 兩位數的加減法</option>
          <option>第9單元 分類整理</option>
          <option>其他</option><option>完成</option>
        </select>
      </div>
      <div class="math-item">
        <div class="math-item-title">基本四則運算（可複選）</div>
        <div class="btn-group" style="flex-wrap:wrap;margin-bottom:10px" id="basicMathGroup">
          <button class="btn-opt" onclick="toggleBasicMath('數數',this)" style="min-width:60px;flex:none">數數</button>
          <button class="btn-opt" onclick="toggleBasicMath('比較',this)" style="min-width:60px;flex:none">比較</button>
          <button class="btn-opt" onclick="toggleBasicMath('數序',this)" style="min-width:60px;flex:none">數序</button>
          <button class="btn-opt" onclick="toggleBasicMath('分與合',this)" style="min-width:60px;flex:none">分與合</button>
          <button class="btn-opt" onclick="toggleBasicMath('形狀',this)" style="min-width:60px;flex:none">形狀</button>
          <button class="btn-opt" onclick="toggleBasicMath('時間',this)" style="min-width:60px;flex:none">時間</button>
          <button class="btn-opt" onclick="toggleBasicMath('加法',this)" style="min-width:60px;flex:none">加法</button>
          <button class="btn-opt" onclick="toggleBasicMath('減法',this)" style="min-width:60px;flex:none">減法</button>
        </div>
        <label style="font-size:12px;color:var(--text-soft);margin-bottom:6px;display:block">整體表現</label>
        <div class="btn-group" style="flex-wrap:wrap" id="basicMathRating">
          <button class="btn-opt" onclick="setG1Math('mathBasic','良好',this)" style="min-width:0;flex:1;font-size:13px">良好</button>
          <button class="btn-opt" onclick="setG1Math('mathBasic','尚可',this)" style="min-width:0;flex:1;font-size:13px">尚可</button>
          <button class="btn-opt" onclick="setG1Math('mathBasic','持續練習',this)" style="min-width:0;flex:1;font-size:13px">持續練習</button>
          <button class="btn-opt" onclick="setG1Math('mathBasic','容易計算錯誤',this)" style="min-width:0;flex:1;font-size:13px">計算錯誤</button>
          <button class="btn-opt" onclick="setG1Math('mathBasic','對位問題',this)" style="min-width:0;flex:1;font-size:13px">對位問題</button>
        </div>
      </div>
      <div class="math-item"><div class="math-item-title">單元內容</div><div class="btn-group"><button class="btn-opt" onclick="setG1Math('unitContent','良好',this)">良好</button><button class="btn-opt" onclick="setG1Math('unitContent','尚可',this)">尚可</button><button class="btn-opt" onclick="setG1Math('unitContent','加油',this)">加油</button></div></div>
      <div class="math-item"><div class="math-item-title">題意理解</div><div class="btn-group"><button class="btn-opt" onclick="setG1Math('problemComp','能獨立解題',this)">能獨立解題</button><button class="btn-opt" onclick="setG1Math('problemComp','能引導解題',this)">能引導解題</button><button class="btn-opt" onclick="setG1Math('problemComp','還要多練習',this)">還要多練習</button></div></div>
      <div class="math-item"><div class="math-item-title">單元測驗</div><div class="btn-group"><button class="btn-opt" onclick="setG1Math('unitTest','通過',this)">通過</button><button class="btn-opt" onclick="setG1Math('unitTest','尚可',this)">尚可</button><button class="btn-opt" onclick="setG1Math('unitTest','加油',this)">加油</button><button class="btn-opt" onclick="setG1Math('unitTest','多練習',this)">多練習</button></div></div>
    </div>
  </div>
</div>

<div class="card hidden" id="noteCard">
  <div class="section-label">備註（選填）</div>
  <textarea id="noteText" rows="3" placeholder="補充說明..."></textarea>
</div>

<button class="submit-btn hidden" id="submitBtn" onclick="askNote()">✓ 送出紀錄</button>

</div><!-- end page-record -->

<!-- 查詢頁面 -->
<div id="page-query" class="hidden">
  <div class="card">
    <div class="section-label">查詢條件</div>
    <div class="field">
      <label>學生</label>
      <select id="queryStudent">
        <option value="">請選擇學生</option>
        <option>柏生</option><option>騏生</option>
        <option>大許</option><option>陳生</option><option>鄭生</option>
        <option>小許</option><option>柯生</option><option>伍生</option>
        <option>林生</option><option>溫生</option>
      </select>
    </div>
    <div style="display:flex;gap:10px">
      <div class="field" style="flex:1"><label>從第幾週</label><input type="number" id="weekFrom" placeholder="10" min="1" max="30"></div>
      <div class="field" style="flex:1"><label>到第幾週</label><input type="number" id="weekTo" placeholder="11" min="1" max="30"></div>
    </div>
    <button class="submit-btn" onclick="queryRecords()" id="queryBtn">🔍 查詢</button>
  </div>
  <div id="queryResult" class="hidden">
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div class="section-label" style="margin:0" id="queryTitle"></div>
        <button onclick="copyResult()" style="background:var(--green);color:white;border:none;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer">複製全部</button>
      </div>
      <div id="queryContent" style="font-size:14px;line-height:2;white-space:pre-wrap"></div>
    </div>
  </div>
  <div id="queryEmpty" class="hidden card">
    <p style="text-align:center;color:var(--text-soft);padding:20px 0">查無資料</p>
  </div>
</div>

<!-- 備註 Modal -->
<div id="noteModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:100;align-items:flex-end;justify-content:center;">
  <div id="noteModalInner">
    <div style="font-size:16px;font-weight:700;margin-bottom:16px">有備註要記錄嗎？</div>
    <div style="display:flex;gap:10px;margin-bottom:16px">
      <button class="btn-opt" onclick="showNoteInput()" style="flex:1;padding:14px;font-size:15px">有，我要記錄</button>
      <button class="btn-opt" onclick="submitRecord()" style="flex:1;padding:14px;font-size:15px">沒有，直接送出</button>
    </div>
    <div id="noteInputArea" class="hidden">
      <textarea id="noteModalText" rows="4" placeholder="補充說明..." style="width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:16px;font-family:inherit;background:#fafaf8;resize:none"></textarea>
      <button class="submit-btn" onclick="submitRecord()" style="margin-top:12px">✓ 確認送出</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwTR29QBJSNnBvzXUsPA9S3w3ydppRIlBYedL6jyGr8HDwm3DyuN9UtdXGnNR5Lo_Dg/exec";

let state = { school:"", student:null, grade:"", subject:"", sentenceResult:"", mathSubRatings:{} };

// 初始化日期
function initDate() {
  const now = new Date();
  const y = now.getFullYear();
  const m = String(now.getMonth()+1).padStart(2,'0');
  const d = String(now.getDate()).padStart(2,'0');
  document.getElementById('dateField').value = y+'/'+m+'/'+d;
}
initDate();

// 頁面切換
function switchTab(tab) {
  document.getElementById('page-record').classList.toggle('hidden', tab !== 'record');
  document.getElementById('page-query').classList.toggle('hidden', tab !== 'query');
  document.getElementById('tab-record').classList.toggle('active', tab === 'record');
  document.getElementById('tab-query').classList.toggle('active', tab === 'query');
}

// 選學校
function selectSchool(school, btn) {
  state.school = school;
  state.student = null;
  document.querySelectorAll('#page-record .btn-group .btn-opt').forEach(b => {
    if (b.textContent === 'SL' || b.textContent === 'SDA') b.classList.remove('sel');
  });
  btn.classList.add('sel');
  const sel = document.getElementById('studentSelect');
  sel.innerHTML = '<option value="">請選擇學生</option>';
  STUDENTS[school].forEach(s => {
    const opt = document.createElement('option');
    opt.value = s.name;
    opt.textContent = s.name + '　' + s.grade;
    sel.appendChild(opt);
  });
  show('studentField');
  hide('gradeField'); hide('subjectCard'); hide('chineseCard'); hide('mathCard'); hide('submitBtn');
}

// 選學生
function onStudentChange() {
  const name = document.getElementById('studentSelect').value;
  if (!name) return;
  state.student = STUDENTS[state.school].find(s => s.name === name);
  state.grade = state.student.grade;
  document.getElementById('gradeText').value = state.grade;
  show('gradeField'); show('subjectCard');
  hide('chineseCard'); hide('mathCard'); hide('submitBtn');
  state.subject = '';
}

// 選科目
function selectSubject(subj, btn) {
  state.subject = subj;
  document.querySelectorAll('#subjectCard .btn-opt').forEach(b => b.classList.remove('sel'));
  btn.classList.add('sel');
  if (subj === '國語') { setupChinese(); show('chineseCard'); hide('mathCard'); }
  else { setupMath(); show('mathCard'); hide('chineseCard'); }
  show('submitBtn');
}

// 設定國語
function setupChinese() {
  const s = state.student;
  const isZheng = s.special === '鄭生';
  const isG1 = s.special === '一年級';
  const isNormal = !isZheng && !isG1;
  setV('normalExercises', isNormal || isZheng);
  setV('ex-charPractice', isZheng);
  setV('grade1ChBlock', isG1);
  setV('ex-reading', isNormal || isZheng);
  if (isG1) {
    const sel = document.getElementById('grade1LessonSelect');
    sel.innerHTML = '<option value="">請選擇課次</option>';
    CH_LESSONS['翰林一'].forEach(l => { const o=document.createElement('option'); o.value=l; o.textContent=l; sel.appendChild(o); });
    hide('lessonSelect');
  } else {
    const sel = document.getElementById('lessonSelect');
    sel.innerHTML = '<option value="">請選擇課次</option>';
    CH_LESSONS[s.chVer].forEach(l => { const o=document.createElement('option'); o.value=l; o.textContent=l; sel.appendChild(o); });
    show('lessonSelect');
  }
  ['writing','vocab','match','reading','charPractice','sentence'].forEach(k => {
    const c = document.getElementById('chk-'+k); if(c) c.checked=false;
    const d = document.getElementById('det-'+k); if(d) d.classList.add('hidden');
  });
  g1ChRatings = {}; zhuyinItems = [];
}

// 設定數學
function setupMath() {
  const s = state.student;
  const isG1 = s.special === '一年級';
  setV('normalMathBlock', !isG1);
  setV('grade1MathBlock', isG1);
  if (!isG1) {
    const sel = document.getElementById('mathUnitSelect');
    sel.innerHTML = '<option value="">請選擇單元</option>';
    const units = MATH_UNITS[s.mathVer] || [];
    units.forEach(u => { const o=document.createElement('option'); o.value=u.unit; o.textContent=u.unit; sel.appendChild(o); });
    hide('mathSubItems');
  }
  g1MathRatings = {}; basicMathItems = [];
  state.mathSubRatings = {};
}

function onMathUnitChange() {
  const unitName = document.getElementById('mathUnitSelect').value;
  state.mathSubRatings = {};
  const s = state.student;
  const units = MATH_UNITS[s.mathVer] || [];
  const unitData = units.find(u => u.unit === unitName);
  if (!unitData || unitData.items.length === 0) { hide('mathSubItems'); return; }
  const list = document.getElementById('mathSubList');
  list.innerHTML = '';
  unitData.items.forEach(item => {
    const div = document.createElement('div');
    div.className = 'math-item';
    div.innerHTML = '<div class="math-item-title">'+item+'</div><div class="btn-group"><button class="btn-opt" onclick="setProf(\''+item+'\',\'良好\',this)">👍 良好</button><button class="btn-opt" onclick="setProf(\''+item+'\',\'尚可\',this)">🤔 尚可</button><button class="btn-opt" onclick="setProf(\''+item+'\',\'加油\',this)">💪 加油</button></div>';
    list.appendChild(div);
  });
  show('mathSubItems');
}

function setProf(item, val, btn) {
  state.mathSubRatings[item] = val;
  const g = btn.closest('.btn-group');
  g.querySelectorAll('.btn-opt').forEach(b => b.classList.remove('sel','sel-green','sel-accent'));
  if (val==='良好') btn.classList.add('sel-green');
  else if (val==='尚可') btn.classList.add('sel');
  else btn.classList.add('sel-accent');
}

function toggleEx(key) {
  const chk = document.getElementById('chk-'+key);
  const det = document.getElementById('det-'+key);
  if (chk.checked) det.classList.remove('hidden');
  else det.classList.add('hidden');
}

function setSentence(val, btn) {
  state.sentenceResult = val;
  document.querySelectorAll('#sentenceGroup .btn-opt').forEach(b => b.classList.remove('sel'));
  btn.classList.add('sel');
}

function toggleZhuyin(item, btn) {
  const idx = zhuyinItems.indexOf(item);
  if (idx===-1) { zhuyinItems.push(item); btn.classList.add('sel'); }
  else { zhuyinItems.splice(idx,1); btn.classList.remove('sel'); }
}

function toggleBasicMath(item, btn) {
  const idx = basicMathItems.indexOf(item);
  if (idx===-1) { basicMathItems.push(item); btn.classList.add('sel'); }
  else { basicMathItems.splice(idx,1); btn.classList.remove('sel'); }
}

function setG1Ch(key, val, btn) {
  g1ChRatings[key] = val;
  const g = btn.closest('.btn-group');
  g.querySelectorAll('.btn-opt').forEach(b => b.classList.remove('sel','sel-green','sel-accent'));
  btn.classList.add('sel');
}

function setG1Math(key, val, btn) {
  g1MathRatings[key] = val;
  const g = btn.closest('.btn-group');
  g.querySelectorAll('.btn-opt').forEach(b => b.classList.remove('sel','sel-green','sel-accent'));
  btn.classList.add('sel');
}

// 備註 Modal
function askNote() {
  if (!state.school || !state.student || !state.subject) { showToast('資料不完整', true); return; }
  document.getElementById('noteModalText').value = '';
  document.getElementById('noteInputArea').classList.add('hidden');
  document.getElementById('noteModal').style.display = 'flex';
}

function showNoteInput() {
  document.getElementById('noteInputArea').classList.remove('hidden');
  document.getElementById('noteModalText').focus();
}

// 送出
async function submitRecord() {
  document.getElementById('noteModal').style.display = 'none';
  const s = state.student;
  const isG1 = s.special === '一年級';
  let mathSubStr = '';
  if (state.subject === '數學' && !isG1) {
    const entries = Object.entries(state.mathSubRatings);
    if (entries.length > 0) mathSubStr = entries.map(([k,v])=>k+':'+v).join('、');
  } else if (isG1) {
    mathSubStr = basicMathItems.join('、') + (g1MathRatings.mathBasic ? '：'+g1MathRatings.mathBasic : '');
  }

  const data = {
    週次: document.getElementById('weekNum').value,
    日期: document.getElementById('dateField').value,
    學校: state.school,
    年級: state.grade,
    學生: s.name,
    科目: state.subject,
    國語課次: state.subject==='國語' ? (isG1 ? document.getElementById('grade1LessonSelect').value : document.getElementById('lessonSelect').value) : '',
    國語練習項目: getChItems(),
    造句: document.getElementById('chk-sentence')?.checked ? (state.sentenceResult||'完成') : '',
    生字書寫答對: document.getElementById('writing-c')?.value||'',
    生字書寫總題: document.getElementById('writing-t')?.value||'',
    語詞解釋答對: document.getElementById('vocab-c')?.value||'',
    語詞解釋總題: document.getElementById('vocab-t')?.value||'',
    語詞配對答對: document.getElementById('match-c')?.value||'',
    語詞配對總題: document.getElementById('match-t')?.value||'',
    課文理解答對: document.getElementById('reading-c')?.value||'',
    課文理解總題: document.getElementById('reading-t')?.value||'',
    生字練習答對: document.getElementById('charPractice-c')?.value||'',
    生字練習總題: document.getElementById('charPractice-t')?.value||'',
    數學單元: state.subject==='數學' ? (isG1 ? document.getElementById('grade1MathUnit').value : document.getElementById('mathUnitSelect').value) : '',
    數學細項熟練: mathSubStr,
    一年級國語評分: isG1 ? JSON.stringify(g1ChRatings) : '',
    一年級數學評分: isG1 ? JSON.stringify(g1MathRatings) : '',
    備註: document.getElementById('noteModalText').value||'',
  };

  if (!data.週次) { showToast('請輸入週次', true); return; }

  try {
    await fetch(SCRIPT_URL, { method:'POST', mode:'no-cors', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data) });
    showToast('✓ 紀錄已送出！');
    setTimeout(resetForm, 1500);
  } catch(e) {
    showToast('送出失敗，請重試', true);
  }
}

function getChItems() {
  if (state.subject !== '國語') return '';
  const items = [];
  if (document.getElementById('chk-writing')?.checked) items.push('生字書寫');
  if (document.getElementById('chk-vocab')?.checked) items.push('語詞解釋');
  if (document.getElementById('chk-match')?.checked) items.push('語詞配對');
  if (document.getElementById('chk-sentence')?.checked) items.push('造句');
  if (document.getElementById('chk-reading')?.checked) items.push('課文理解測驗');
  if (document.getElementById('chk-charPractice')?.checked) items.push('常用字認字');
  return items.join('、');
}

function resetForm() {
  document.getElementById('weekNum').value = '';
  document.getElementById('studentSelect').value = '';
  document.getElementById('noteModalText').value = '';
  state = { school:"", student:null, grade:"", subject:"", sentenceResult:"", mathSubRatings:{} };
  g1ChRatings={}; g1MathRatings={}; basicMathItems=[]; zhuyinItems=[];
  document.querySelectorAll('.btn-opt').forEach(b => b.classList.remove('sel','sel-green','sel-accent'));
  hide('studentField'); hide('gradeField'); hide('subjectCard'); hide('chineseCard'); hide('mathCard'); hide('submitBtn');
  initDate();
}

// 查詢
async function queryRecords() {
  const student = document.getElementById('queryStudent').value;
  const weekFrom = document.getElementById('weekFrom').value;
  const weekTo = document.getElementById('weekTo').value;
  if (!student) { showToast('請選擇學生', true); return; }
  if (!weekFrom || !weekTo) { showToast('請輸入週次範圍', true); return; }
  const btn = document.getElementById('queryBtn');
  btn.textContent = '查詢中...'; btn.disabled = true;
  hide('queryResult'); hide('queryEmpty');
  try {
    const url = SCRIPT_URL + '?student=' + encodeURIComponent(student) + '&weekFrom=' + weekFrom + '&weekTo=' + weekTo;
    const res = await fetch(url);
    const json = await res.json();
    if (!json.data || json.data.length === 0) show('queryEmpty');
    else renderResult(student, weekFrom, weekTo, json.data);
  } catch(e) {
    showToast('查詢失敗，請重試', true);
  }
  btn.textContent = '🔍 查詢'; btn.disabled = false;
}

function renderResult(student, from, to, rows) {
  const grouped = {};
  rows.forEach(r => {
    const key = (r['週次']||'') + '|' + (r['科目']||'');
    if (!grouped[key]) grouped[key] = [];
    grouped[key].push(r);
  });
  let text = student + '　第' + from + '～' + to + '週學習摘要\n' + '─'.repeat(20) + '\n\n';
  const keys = Object.keys(grouped).sort((a,b) => {
    return parseInt(a.split('|')[0].replace(/[^0-9]/g,'')) - parseInt(b.split('|')[0].replace(/[^0-9]/g,''));
  });
  let lastWeek = '';
  keys.forEach(key => {
    const [week, subj] = key.split('|');
    const records = grouped[key];
    if (week !== lastWeek) { text += '📅 ' + week + '\n'; lastWeek = week; }
    records.forEach(r => {
      if (subj === '國語') {
        text += '\n【國語】' + (r['國語課次']||'') + '\n';
        const items = (r['國語練習項目']||'').split('、').filter(Boolean);
        items.forEach(item => {
          if (item==='生字書寫') text += '  • 生字書寫：'+(r['生字書寫答對']||'-')+'/'+(r['生字書寫總題']||'-')+'\n';
          else if (item==='語詞解釋') text += '  • 語詞解釋：'+(r['語詞解釋答對']||'-')+'/'+(r['語詞解釋總題']||'-')+'\n';
          else if (item==='語詞配對') text += '  • 語詞配對：'+(r['語詞配對答對']||'-')+'/'+(r['語詞配對總題']||'-')+'\n';
          else if (item==='課文理解測驗') text += '  • 課文理解：'+(r['課文理解答對']||'-')+'/'+(r['課文理解總題']||'-')+'\n';
          else if (item==='常用字認字') text += '  • 常用字認字：'+(r['生字練習答對']||'-')+'/'+(r['生字練習總題']||'-')+'\n';
          else if (item==='造句') text += '  • 造句：'+(r['造句']||'')+'\n';
        });
        if (r['備註']) text += '  📝 '+(r['備註']||'')+'\n';
      } else if (subj === '數學') {
        text += '\n【數學】'+(r['數學單元']||'')+'\n';
        const 細項 = r['數學細項熟練']||'';
        if (細項) 細項.split('、').forEach(i => { text += '  • '+i+'\n'; });
        if (r['備註']) text += '  📝 '+(r['備註']||'')+'\n';
      }
    });
    text += '\n';
  });
  document.getElementById('queryTitle').textContent = student + ' 第' + from + '～' + to + '週';
  document.getElementById('queryContent').textContent = text.trim();
  show('queryResult');
}

function copyResult() {
  const text = document.getElementById('queryContent').textContent;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => showToast('✓ 已複製！'));
  } else {
    const el = document.createElement('textarea');
    el.value = text; document.body.appendChild(el); el.select();
    document.execCommand('copy'); document.body.removeChild(el);
    showToast('✓ 已複製！');
  }
}

function show(id) { document.getElementById(id)?.classList.remove('hidden'); }
function hide(id) { document.getElementById(id)?.classList.add('hidden'); }
function setV(id, visible) { visible ? show(id) : hide(id); }

function showToast(msg, isError=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (isError ? ' error' : '');
  setTimeout(() => t.classList.add('show'), 10);
  setTimeout(() => t.classList.remove('show'), 2500);
}
