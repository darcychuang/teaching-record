<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>教學紀錄</title>
<style>
  :root {
    --bg: #f5f0eb;
    --card: #ffffff;
    --primary: #3d6b8e;
    --primary-light: #e8f0f7;
    --accent: #e07b4f;
    --accent-light: #fdf0ea;
    --green: #4a8c6f;
    --green-light: #e8f5ef;
    --text: #2a2a2a;
    --text-soft: #666;
    --border: #e0d8d0;
    --radius: 14px;
    --shadow: 0 2px 16px rgba(0,0,0,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, 'PingFang TC', 'Heiti TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 16px;
  }

  header {
    text-align: center;
    padding: 20px 0 24px;
  }
  header h1 {
    font-size: 22px;
    font-weight: 700;
    color: var(--primary);
    letter-spacing: 2px;
  }
  header p {
    font-size: 13px;
    color: var(--text-soft);
    margin-top: 4px;
  }

  .card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 14px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
  }

  .section-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--text-soft);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .field {
    margin-bottom: 16px;
  }
  .field:last-child { margin-bottom: 0; }

  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-soft);
    margin-bottom: 6px;
  }

  input[type="text"], input[type="number"], select, textarea {
    width: 100%;
    padding: 12px 14px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-size: 16px;
    font-family: inherit;
    background: #fafaf8;
    color: var(--text);
    appearance: none;
    -webkit-appearance: none;
    transition: border-color 0.2s;
  }
  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: var(--primary);
    background: white;
  }

  .btn-group {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .btn-option {
    flex: 1;
    min-width: 80px;
    padding: 10px 8px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    background: #fafaf8;
    font-size: 14px;
    font-family: inherit;
    color: var(--text);
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
    font-weight: 500;
  }
  .btn-option.selected {
    background: var(--primary);
    border-color: var(--primary);
    color: white;
    font-weight: 600;
  }
  .btn-option.selected-accent {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
    font-weight: 600;
  }
  .btn-option.selected-green {
    background: var(--green);
    border-color: var(--green);
    color: white;
    font-weight: 600;
  }

  .fraction-input {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .fraction-input input {
    flex: 1;
    text-align: center;
  }
  .fraction-slash {
    font-size: 20px;
    color: var(--text-soft);
    font-weight: 300;
  }

  .subject-block {
    background: var(--primary-light);
    border-radius: 12px;
    padding: 16px;
    margin-top: 4px;
  }
  .subject-block.math {
    background: var(--accent-light);
  }

  .exercise-item {
    background: white;
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 10px;
    border: 1px solid var(--border);
  }
  .exercise-item:last-child { margin-bottom: 0; }
  .exercise-title {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 10px;
    color: var(--text);
  }

  .math-item {
    background: white;
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 10px;
    border: 1px solid var(--border);
  }
  .math-item-title {
    font-size: 13px;
    color: var(--text-soft);
    margin-bottom: 8px;
    font-weight: 500;
  }
  .proficiency-group {
    display: flex;
    gap: 6px;
  }
  .proficiency-group .btn-option {
    min-width: 0;
    padding: 8px 4px;
    font-size: 13px;
  }

  .checkbox-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .checkbox-row:last-child { border-bottom: none; }
  .checkbox-row input[type="checkbox"] {
    width: 20px;
    height: 20px;
    border-radius: 6px;
    accent-color: var(--primary);
    cursor: pointer;
    flex-shrink: 0;
  }
  .checkbox-row label {
    margin: 0;
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    cursor: pointer;
  }

  .submit-btn {
    width: 100%;
    padding: 16px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: var(--radius);
    font-size: 17px;
    font-weight: 700;
    font-family: inherit;
    letter-spacing: 1px;
    cursor: pointer;
    margin-top: 8px;
    transition: background 0.2s, transform 0.1s;
  }
  .submit-btn:active { transform: scale(0.98); }
  .submit-btn:disabled { background: #aaa; }

  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--green);
    color: white;
    padding: 14px 28px;
    border-radius: 100px;
    font-size: 15px;
    font-weight: 600;
    transition: transform 0.3s ease;
    z-index: 999;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.error { background: #c0392b; }

  .hidden { display: none !important; }

  select option { font-size: 16px; }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 16px 0;
  }
</style>
</head>
<body>

<header>
  <h1>📚 教學紀錄</h1>
  <p>巡迴輔導記錄系統</p>
</header>

<!-- 基本資訊 -->
<div class="card">
  <div class="section-label">基本資訊</div>

  <div class="field">
    <label>週次</label>
    <input type="text" id="weekNum" placeholder="例：第10週" />
  </div>

  <div class="field">
    <label>日期</label>
    <input type="text" id="dateField" readonly />
  </div>

  <div class="field">
    <label>學校</label>
    <div class="btn-group" id="schoolGroup">
      <button class="btn-option" onclick="selectSchool('SL')">SL</button>
      <button class="btn-option" onclick="selectSchool('SDA')">SDA</button>
    </div>
  </div>

  <div class="field hidden" id="studentField">
    <label>學生</label>
    <select id="studentSelect" onchange="onStudentChange()">
      <option value="">請選擇學生</option>
    </select>
  </div>

  <div class="field hidden" id="gradeDisplay">
    <label>年級</label>
    <input type="text" id="gradeText" readonly />
  </div>
</div>

<!-- 科目 -->
<div class="card hidden" id="subjectCard">
  <div class="section-label">科目</div>
  <div class="btn-group">
    <button class="btn-option" onclick="selectSubject('國語')">📖 國語</button>
    <button class="btn-option" onclick="selectSubject('數學')">🔢 數學</button>
  </div>
</div>

<!-- 國語內容 -->
<div class="card hidden" id="chineseCard">
  <div class="section-label">國語內容</div>
  <div class="subject-block">

    <div class="field">
      <label>課次</label>
      <select id="lessonSelect">
        <option value="">請選擇課次</option>
      </select>
    </div>

    <div class="divider"></div>

    <!-- 練習項目 -->
    <div id="exerciseItems">
      <!-- 生字書寫 -->
      <div class="exercise-item" id="ex-writing">
        <div class="checkbox-row">
          <input type="checkbox" id="chk-writing" onchange="toggleExercise('writing')">
          <label for="chk-writing">生字書寫</label>
        </div>
        <div id="detail-writing" class="hidden" style="padding-top:10px">
          <div class="fraction-input">
            <input type="number" id="writing-correct" placeholder="答對" min="0">
            <span class="fraction-slash">/</span>
            <input type="number" id="writing-total" placeholder="總題" min="0">
          </div>
        </div>
      </div>

      <!-- 語詞解釋 -->
      <div class="exercise-item" id="ex-vocab">
        <div class="checkbox-row">
          <input type="checkbox" id="chk-vocab" onchange="toggleExercise('vocab')">
          <label for="chk-vocab">語詞解釋</label>
        </div>
        <div id="detail-vocab" class="hidden" style="padding-top:10px">
          <div class="fraction-input">
            <input type="number" id="vocab-correct" placeholder="答對" min="0">
            <span class="fraction-slash">/</span>
            <input type="number" id="vocab-total" placeholder="總題" min="0">
          </div>
        </div>
      </div>

      <!-- 語詞配對 -->
      <div class="exercise-item" id="ex-match">
        <div class="checkbox-row">
          <input type="checkbox" id="chk-match" onchange="toggleExercise('match')">
          <label for="chk-match">語詞配對</label>
        </div>
        <div id="detail-match" class="hidden" style="padding-top:10px">
          <div class="fraction-input">
            <input type="number" id="match-correct" placeholder="答對" min="0">
            <span class="fraction-slash">/</span>
            <input type="number" id="match-total" placeholder="總題" min="0">
          </div>
        </div>
      </div>

      <!-- 造句 -->
      <div class="exercise-item" id="ex-sentence">
        <div class="checkbox-row">
          <input type="checkbox" id="chk-sentence" onchange="toggleExercise('sentence')">
          <label for="chk-sentence">造句</label>
        </div>
        <div id="detail-sentence" class="hidden" style="padding-top:10px">
          <div class="btn-group" id="sentenceGroup">
            <button class="btn-option" onclick="selectSentence('獨力完成', this)">獨力完成</button>
            <button class="btn-option" onclick="selectSentence('引導完成', this)">引導完成</button>
          </div>
        </div>
      </div>

      <!-- 課文理解測驗 -->
      <div class="exercise-item" id="ex-reading">
        <div class="checkbox-row">
          <input type="checkbox" id="chk-reading" onchange="toggleExercise('reading')">
          <label for="chk-reading">課文理解測驗</label>
        </div>
        <div id="detail-reading" class="hidden" style="padding-top:10px">
          <div class="fraction-input">
            <input type="number" id="reading-correct" placeholder="答對" min="0">
            <span class="fraction-slash">/</span>
            <input type="number" id="reading-total" placeholder="總題" min="0">
          </div>
        </div>
      </div>

      <!-- 常用字認字（鄭生專屬） -->
      <div class="exercise-item hidden" id="ex-charPractice">
        <div class="checkbox-row">
          <input type="checkbox" id="chk-charPractice" onchange="toggleExercise('charPractice')">
          <label for="chk-charPractice">常用字認字</label>
        </div>
        <div id="detail-charPractice" class="hidden" style="padding-top:10px">
          <input type="text" id="charPractice-unit" placeholder="單元名稱（如：第1單元）" style="margin-bottom:8px">
          <div class="fraction-input">
            <input type="number" id="charPractice-correct" placeholder="答對" min="0">
            <span class="fraction-slash">/</span>
            <input type="number" id="charPractice-total" placeholder="總題" min="0">
          </div>
        </div>
      </div>
    </div>

    <!-- 一年級國語區塊（林生、溫生） -->
    <div id="grade1-chinese-block" class="hidden">
      <div class="divider"></div>

      <div class="field">
        <label>課次</label>
        <select id="grade1LessonSelect">
          <option value="">請選擇課次</option>
          <option>L1</option><option>L2</option><option>L3</option>
          <option>L4</option><option>L5</option><option>L6</option>
          <option>L7</option><option>L8</option><option>L9</option>
          <option>L10</option><option>L11</option><option>L12</option>
          <option>其他</option><option>完成</option>
        </select>
      </div>

      <!-- 注音符號（可複選多項） -->
      <div class="exercise-item">
        <div class="section-label" style="margin-bottom:8px">注音符號</div>
        <div id="zhuyin-items">
          <div class="math-item" id="zhuyin-37">
            <div class="math-item-title">37個符號</div>
            <div class="proficiency-group">
              <button class="btn-option" onclick="setGrade1Rating('zhuyin37','良好',this)">良好</button>
              <button class="btn-option" onclick="setGrade1Rating('zhuyin37','尚可',this)">尚可</button>
              <button class="btn-option" onclick="setGrade1Rating('zhuyin37','加油',this)">加油</button>
            </div>
          </div>
          <div class="math-item" id="zhuyin-double">
            <div class="math-item-title">結合韻雙拼</div>
            <div class="proficiency-group">
              <button class="btn-option" onclick="setGrade1Rating('zhuyinDouble','良好',this)">良好</button>
              <button class="btn-option" onclick="setGrade1Rating('zhuyinDouble','尚可',this)">尚可</button>
              <button class="btn-option" onclick="setGrade1Rating('zhuyinDouble','加油',this)">加油</button>
            </div>
          </div>
          <div class="math-item" id="zhuyin-triple">
            <div class="math-item-title">結合韻三拼</div>
            <div class="proficiency-group">
              <button class="btn-option" onclick="setGrade1Rating('zhuyinTriple','良好',this)">良好</button>
              <button class="btn-option" onclick="setGrade1Rating('zhuyinTriple','尚可',this)">尚可</button>
              <button class="btn-option" onclick="setGrade1Rating('zhuyinTriple','加油',this)">加油</button>
            </div>
          </div>
          <div class="math-item" id="zhuyin-tone">
            <div class="math-item-title">聲調</div>
            <div class="proficiency-group">
              <button class="btn-option" onclick="setGrade1Rating('zhuyinTone','良好',this)">良好</button>
              <button class="btn-option" onclick="setGrade1Rating('zhuyinTone','尚可',this)">尚可</button>
              <button class="btn-option" onclick="setGrade1Rating('zhuyinTone','加油',this)">加油</button>
            </div>
          </div>
        </div>
      </div>

      <!-- 語詞讀 -->
      <div class="math-item">
        <div class="math-item-title">語詞 讀</div>
        <div class="proficiency-group">
          <button class="btn-option" onclick="setGrade1Rating('vocabRead','良好',this)">良好</button>
          <button class="btn-option" onclick="setGrade1Rating('vocabRead','尚可',this)">尚可</button>
          <button class="btn-option" onclick="setGrade1Rating('vocabRead','加油',this)">加油</button>
        </div>
      </div>

      <!-- 生字讀 -->
      <div class="math-item">
        <div class="math-item-title">生字 讀</div>
        <div class="proficiency-group">
          <button class="btn-option" onclick="setGrade1Rating('charRead','良好',this)">良好</button>
          <button class="btn-option" onclick="setGrade1Rating('charRead','尚可',this)">尚可</button>
          <button class="btn-option" onclick="setGrade1Rating('charRead','加油',this)">加油</button>
        </div>
      </div>

      <!-- 生字寫 -->
      <div class="math-item">
        <div class="math-item-title">生字 寫</div>
        <div class="proficiency-group">
          <button class="btn-option" onclick="setGrade1Rating('charWrite','良好',this)">良好</button>
          <button class="btn-option" onclick="setGrade1Rating('charWrite','尚可',this)">尚可</button>
          <button class="btn-option" onclick="setGrade1Rating('charWrite','加油',this)">加油</button>
        </div>
      </div>

      <!-- 課文跟讀 -->
      <div class="math-item">
        <div class="math-item-title">課文跟讀</div>
        <div class="proficiency-group">
          <button class="btn-option" onclick="setGrade1Rating('textFollow','良好',this)">良好</button>
          <button class="btn-option" onclick="setGrade1Rating('textFollow','尚可',this)">尚可</button>
          <button class="btn-option" onclick="setGrade1Rating('textFollow','加油',this)">加油</button>
        </div>
      </div>

      <!-- 課文理解 -->
      <div class="math-item">
        <div class="math-item-title">課文理解</div>
        <div class="proficiency-group">
          <button class="btn-option" onclick="setGrade1Rating('textComp','良好',this)">良好</button>
          <button class="btn-option" onclick="setGrade1Rating('textComp','尚可',this)">尚可</button>
          <button class="btn-option" onclick="setGrade1Rating('textComp','加油',this)">加油</button>
        </div>
      </div>

      <!-- 句型練習 -->
      <div class="math-item">
        <div class="math-item-title">句型練習</div>
        <div class="proficiency-group">
          <button class="btn-option" onclick="setGrade1Rating('sentence','良好',this)">良好</button>
          <button class="btn-option" onclick="setGrade1Rating('sentence','尚可',this)">尚可</button>
          <button class="btn-option" onclick="setGrade1Rating('sentence','加油',this)">加油</button>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- 數學內容 -->
<div class="card hidden" id="mathCard">
  <div class="section-label">數學內容</div>
  <div class="subject-block math">

    <div class="field">
      <label>單元</label>
      <select id="mathUnitSelect" onchange="onMathUnitChange()">
        <option value="">請選擇單元</option>
      </select>
    </div>

    <div id="mathUnitField">
    <div id="mathSubItems" class="hidden">
      <div class="divider"></div>
      <label style="font-size:13px;font-weight:600;color:var(--text-soft);margin-bottom:10px;display:block">各細項熟練度</label>
      <div id="mathSubItemsList"></div>
    </div>
    </div>

    <!-- 一年級數學（林生、溫生） -->
    <div id="grade1-math-block" class="hidden">
      <div class="divider"></div>

      <!-- 單元選單 -->
      <div class="field">
        <label>單元</label>
        <select id="grade1MathUnitSelect">
          <option value="">請選擇單元</option>
          <option>第1單元 20以內的加法</option>
          <option>第2單元 長度</option>
          <option>第3單元 20以內的減法</option>
          <option>第4單元 100以內的數</option>
          <option>第5單元 形狀與形體</option>
          <option>第6單元 數數看有多少元</option>
          <option>第7單元 幾月幾日星期幾</option>
          <option>第8單元 兩位數的加減法</option>
          <option>第9單元 分類整理</option>
          <option>其他</option>
          <option>完成</option>
        </select>
      </div>

      <!-- 基本四則運算 -->
      <div class="math-item">
        <div class="math-item-title">基本四則運算</div>
        <div style="margin-bottom:10px">
          <label style="font-size:12px;color:var(--text-soft);margin-bottom:6px;display:block">練習項目（可複選）</label>
          <div class="btn-group" style="flex-wrap:wrap" id="basicMathGroup">
            <button class="btn-option" onclick="toggleBasicMath('數數',this)" style="min-width:60px;flex:none;font-size:13px">數數</button>
            <button class="btn-option" onclick="toggleBasicMath('比較',this)" style="min-width:60px;flex:none;font-size:13px">比較</button>
            <button class="btn-option" onclick="toggleBasicMath('數序',this)" style="min-width:60px;flex:none;font-size:13px">數序</button>
            <button class="btn-option" onclick="toggleBasicMath('分與合',this)" style="min-width:60px;flex:none;font-size:13px">分與合</button>
            <button class="btn-option" onclick="toggleBasicMath('形狀',this)" style="min-width:60px;flex:none;font-size:13px">形狀</button>
            <button class="btn-option" onclick="toggleBasicMath('時間',this)" style="min-width:60px;flex:none;font-size:13px">時間</button>
            <button class="btn-option" onclick="toggleBasicMath('加法',this)" style="min-width:60px;flex:none;font-size:13px">加法</button>
            <button class="btn-option" onclick="toggleBasicMath('減法',this)" style="min-width:60px;flex:none;font-size:13px">減法</button>
          </div>
        </div>
        <div>
          <label style="font-size:12px;color:var(--text-soft);margin-bottom:6px;display:block">整體表現</label>
          <div style="display:flex;flex-wrap:wrap;gap:6px" id="basicMathRatingGroup">
            <button class="btn-option" onclick="setGrade1MathRating('mathBasic','良好',this)" style="min-width:0;flex:1;font-size:13px;padding:8px 4px">良好</button>
            <button class="btn-option" onclick="setGrade1MathRating('mathBasic','尚可',this)" style="min-width:0;flex:1;font-size:13px;padding:8px 4px">尚可</button>
            <button class="btn-option" onclick="setGrade1MathRating('mathBasic','持續練習',this)" style="min-width:0;flex:1;font-size:13px;padding:8px 4px">持續練習</button>
            <button class="btn-option" onclick="setGrade1MathRating('mathBasic','容易計算錯誤',this)" style="min-width:0;flex:1;font-size:13px;padding:8px 4px">計算錯誤</button>
            <button class="btn-option" onclick="setGrade1MathRating('mathBasic','對位問題',this)" style="min-width:0;flex:1;font-size:13px;padding:8px 4px">對位問題</button>
          </div>
        </div>
      </div>

      <!-- 單元內容 -->
      <div class="math-item">
        <div class="math-item-title">單元內容</div>
        <div class="proficiency-group" id="unitContentGroup">

};

// ===== 初始化日期 =====
function initDate() {
  const now = new Date();
  const y = now.getFullYear();
  const m = String(now.getMonth()+1).padStart(2,'0');
  const d = String(now.getDate()).padStart(2,'0');
  document.getElementById('dateField').value = `${y}/${m}/${d}`;
}
initDate();

// ===== 選學校 =====
function selectSchool(school) {
  state.school = school;
  state.student = null;
  state.subject = "";
  document.querySelectorAll('#schoolGroup .btn-option').forEach(b => b.classList.remove('selected'));
  event.target.classList.add('selected');

  const sel = document.getElementById('studentSelect');
  sel.innerHTML = '<option value="">請選擇學生</option>';
  STUDENTS[school].forEach(s => {
    const opt = document.createElement('option');
    opt.value = s.name;
    opt.textContent = s.name + "　" + s.grade;
    sel.appendChild(opt);
  });

  show('studentField');
  hide('gradeDisplay');
  hide('subjectCard');
  hide('chineseCard');
  hide('mathCard');
  hide('noteCard');
  hide('submitBtn');
}

// ===== 選學生 =====
function onStudentChange() {
  const name = document.getElementById('studentSelect').value;
  if (!name) return;
  const list = STUDENTS[state.school];
  state.student = list.find(s => s.name === name);
  state.grade = state.student.grade;
  document.getElementById('gradeText').value = state.grade;
  show('gradeDisplay');
  show('subjectCard');
  hide('chineseCard');
  hide('mathCard');
  hide('noteCard');
  hide('submitBtn');
  state.subject = "";
}

// ===== 選科目 =====
function selectSubject(subj) {
  state.subject = subj;
  document.querySelectorAll('#subjectCard .btn-option').forEach(b => b.classList.remove('selected'));
  event.target.classList.add('selected');

  if (subj === '國語') {
    setupChineseCard();
    show('chineseCard');
    hide('mathCard');
  } else {
    setupMathCard();
    show('mathCard');
    hide('chineseCard');
  }
  show('noteCard');
  show('submitBtn');
}

// ===== 設定國語 =====
function setupChineseCard() {
  const s = state.student;
  let lessonKey = s.chVer;
  if (s.chVer === '南一') {
    lessonKey = s.grade === '五年級' ? '南一五' : '南一四';
  } else if (s.chVer === '翰林') {
    lessonKey = s.grade === '四年級' ? '翰林四' : '翰林一';
  }
  state.lessonKey = lessonKey;

  // 課次
  const sel = document.getElementById('lessonSelect');
  sel.innerHTML = '<option value="">請選擇課次</option>';
  const lessons = CH_LESSONS[lessonKey] || [];
  lessons.forEach(l => {
    const opt = document.createElement('option');
    opt.value = l; opt.textContent = l;
    sel.appendChild(opt);
  });

  // 特殊模式判斷
  const isZheng = s.special === '鄭生';
  const isGrade1 = s.special === '一年級';
  const isNormal = !isZheng && !isGrade1;

  setVisible('ex-writing', isNormal);
  setVisible('ex-vocab', isNormal);
  setVisible('ex-match', isNormal);
  setVisible('ex-sentence', isNormal || isZheng);
  setVisible('ex-reading', isNormal || isZheng);
  setVisible('ex-charPractice', isZheng);
  setVisible('grade1-chinese-block', isGrade1);

  // 重設勾選
  ['writing','vocab','match','reading','charPractice'].forEach(k => {
    const chk = document.getElementById('chk-'+k);
    if (chk) { chk.checked = false; hide('detail-'+k); }
  });
  const chkS = document.getElementById('chk-sentence');
  if (chkS) { chkS.checked = false; hide('detail-sentence'); }
  resetGrade1Chinese();
}

// ===== 設定數學 =====
function setupMathCard() {
  const s = state.student;
  let mathKey = s.mathVer === '南一' 
    ? (s.grade === '五年級' ? '南一五' : '南一四')
    : (s.mathVer === '康軒' ? '康軒四' : null);

  const sel = document.getElementById('mathUnitSelect');
  sel.innerHTML = '<option value="">請選擇單元</option>';

  // 一年級特殊數學
  const isGrade1Math = s.special === '一年級';
  setVisible('grade1-math-block', isGrade1Math);
  setVisible('mathUnitField', !isGrade1Math);

  if (!isGrade1Math && mathKey && MATH_UNITS[mathKey]) {
    MATH_UNITS[mathKey].forEach(u => {
      const opt = document.createElement('option');
      opt.value = u.unit; opt.textContent = u.unit;
      sel.appendChild(opt);
    });
  }
  hide('mathSubItems');
  state.mathUnit = "";
  state.mathSubRatings = {};
  if (isGrade1Math) resetGrade1Math();
}

  state.mathSubRatings = {};

  const s = state.student;
  let mathKey = s.mathVer === '南一'
    ? (s.grade === '五年級' ? '南一五' : '南一四')
    : (s.mathVer === '康軒' ? '康軒四' : null);

  if (!mathKey) { hide('mathSubItems'); return; }

  const unitData = MATH_UNITS[mathKey].find(u => u.unit === unitName);
  if (!unitData || unitData.items.length === 0) { hide('mathSubItems'); return; }

  const list = document.getElementById('mathSubItemsList');
  list.innerHTML = '';
  unitData.items.forEach(item => {
    const div = document.createElement('div');
    div.className = 'math-item';
    div.innerHTML = `
      <div class="math-item-title">${item}</div>
      <div class="proficiency-group">
        <button class="btn-option" onclick="setProficiency('${item}', '良好', this)">👍 良好</button>
        <button class="btn-option" onclick="setProficiency('${item}', '尚可', this)">🤔 尚可</button>
        <button class="btn-option" onclick="setProficiency('${item}', '加油', this)">💪 加油</button>
      </div>`;
    list.appendChild(div);
  });
  show('mathSubItems');
}

function setProficiency(item, level, btn) {
  state.mathSubRatings[item] = level;
  const group = btn.closest('.proficiency-group');
  group.querySelectorAll('.btn-option').forEach(b => {
    b.classList.remove('selected','selected-green','selected-accent');
  });
  if (level === '良好') btn.classList.add('selected-green');
  else if (level === '尚可') btn.classList.add('selected');
  else btn.classList.add('selected-accent');
}

// ===== 切換練習詳情 =====
function toggleExercise(key) {
  const chk = document.getElementById('chk-'+key);
  const detail = document.getElementById('detail-'+key);
  if (chk.checked) show(detail.id);
  else hide(detail.id);
}

// ===== 一年級評分狀態 =====
let grade1ChRatings = {};
let grade1MathRatings = {};
let basicMathItems = [];

function setGrade1Rating(key, val, btn) {
  const group = btn.closest('.proficiency-group') || btn.closest('div[style*="flex-wrap"]');
  if (group) group.querySelectorAll('.btn-option').forEach(b => b.classList.remove('selected','selected-green','selected-accent'));
  btn.classList.add('selected');
  grade1ChRatings[key] = val;
}

function setGrade1MathRating(key, val, btn) {
  const group = btn.closest('.proficiency-group') || btn.closest('div[style*="flex-wrap"]');
  if (group) group.querySelectorAll('.btn-option').forEach(b => b.classList.remove('selected','selected-green','selected-accent'));
  btn.classList.add('selected');
  grade1MathRatings[key] = val;
}

function toggleBasicMath(item, btn) {
  const idx = basicMathItems.indexOf(item);
  if (idx === -1) {
    basicMathItems.push(item);
    btn.classList.add('selected');
  } else {
    basicMathItems.splice(idx, 1);
    btn.classList.remove('selected');
  }
}

function resetGrade1Chinese() {
  grade1ChRatings = {};
  document.querySelectorAll('#grade1-chinese-block .btn-option').forEach(b => b.classList.remove('selected','selected-green','selected-accent'));
  const ls = document.getElementById('grade1LessonSelect');
  if (ls) ls.value = '';
}

function resetGrade1Math() {
  grade1MathRatings = {};
  basicMathItems = [];
  document.querySelectorAll('#grade1-math-block .btn-option').forEach(b => b.classList.remove('selected','selected-green','selected-accent'));
  const sel = document.getElementById('grade1MathUnitSelect');
  if (sel) sel.value = '';
}

// ===== 造句評分 =====
function selectSentence(val, btn) {
  state.sentenceResult = val;
  document.querySelectorAll('#sentenceGroup .btn-option').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
}

// ===== 備註 Modal =====
function askNote() {
  if (!state.school) { showToast('請選擇學校', true); return; }
  if (!state.student) { showToast('請選擇學生', true); return; }
  if (!state.subject) { showToast('請選擇科目', true); return; }
  document.getElementById('noteText').value = '';
  document.getElementById('noteInputArea').style.display = 'none';
  document.getElementById('noteModal').style.display = 'flex';
}

function showNoteInput() {
  document.getElementById('noteInputArea').style.display = 'block';
  document.getElementById('noteText').focus();
}

// ===== 送出 =====
async function submitRecord() {
  const weekNum = document.getElementById('weekNum').value.trim();
  const date = document.getElementById('dateField').value;
  if (!weekNum) { showToast('請輸入週次', true); return; }
  if (!state.school) { showToast('請選擇學校', true); return; }
  if (!state.student) { showToast('請選擇學生', true); return; }
  if (!state.subject) { showToast('請選擇科目', true); return; }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = '送出中...';

  // 整理數學細項
  let mathSubStr = '';
  if (state.subject === '數學') {
    const entries = Object.entries(state.mathSubRatings);
    if (entries.length > 0) {
      mathSubStr = entries.map(([k,v]) => `${k}:${v}`).join('、');
    }
  }

  // 整理國語練習項目
  let chItems = [];
  if (document.getElementById('chk-writing')?.checked) chItems.push('生字書寫');
  if (document.getElementById('chk-vocab')?.checked) chItems.push('語詞解釋');
  if (document.getElementById('chk-match')?.checked) chItems.push('語詞配對');
  if (document.getElementById('chk-sentence')?.checked) chItems.push('造句');
  if (document.getElementById('chk-reading')?.checked) chItems.push('課文理解測驗');
  if (document.getElementById('chk-charPractice')?.checked) chItems.push('一年級生字練習');

  const data = {
    週次: weekNum,
    日期: date,
    學校: state.school,
    年級: state.grade,
    學生: state.student?.name || '',
    科目: state.subject,
    國語課次: state.subject === '國語' ? document.getElementById('lessonSelect').value : '',
    國語練習項目: state.subject === '國語' ? chItems.join('、') : '',
    造句: document.getElementById('chk-sentence')?.checked ? (state.sentenceResult || '完成') : '',
    生字書寫答對: document.getElementById('writing-correct')?.value || '',
    生字書寫總題: document.getElementById('writing-total')?.value || '',
    語詞解釋答對: document.getElementById('vocab-correct')?.value || '',
    語詞解釋總題: document.getElementById('vocab-total')?.value || '',
    語詞配對答對: document.getElementById('match-correct')?.value || '',
    語詞配對總題: document.getElementById('match-total')?.value || '',
    課文理解答對: document.getElementById('reading-correct')?.value || '',
    課文理解總題: document.getElementById('reading-total')?.value || '',
    生字練習答對: document.getElementById('charPractice-correct')?.value || '',
    生字練習總題: document.getElementById('charPractice-total')?.value || '',
    數學單元: state.subject === '數學' ? (state.student?.special === '一年級' ? (document.getElementById('grade1MathUnitSelect')?.value || '') : state.mathUnit) : '',
    數學細項熟練: state.student?.special === '一年級' ? (basicMathItems.join('、') + (grade1MathRatings.mathBasic ? '：'+grade1MathRatings.mathBasic : '')) : mathSubStr,
    數學一年級評分: state.student?.special === '一年級' ? JSON.stringify(grade1MathRatings) : '',
    國語一年級評分: state.student?.special === '一年級' ? JSON.stringify(grade1ChRatings) : '',
    常用字認字單元: document.getElementById('charPractice-unit')?.value || '',
    備註: document.getElementById('noteText')?.value || '',
  };

  try {
    await fetch(SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data),
    });
    showToast('✓ 紀錄已送出！');
    setTimeout(() => resetForm(), 1500);
  } catch (e) {
    showToast('送出失敗，請重試', true);
  }

  btn.disabled = false;
  btn.textContent = '✓ 送出紀錄';
}

// ===== 重設 =====
function resetForm() {
  document.getElementById('noteModal').style.display = 'none';
  document.getElementById('weekNum').value = '';
  document.getElementById('studentSelect').value = '';
  document.getElementById('noteText').value = '';
  state = { school:"", student:null, grade:"", subject:"", lessonKey:"", mathUnit:"", mathSubRatings:{}, sentenceResult:"" };
  document.querySelectorAll('.btn-option').forEach(b => b.classList.remove('selected','selected-green','selected-accent'));
  document.getElementById('chk-sentence').checked = false;
  hide('detail-sentence');
  hide('studentField'); hide('gradeDisplay'); hide('subjectCard');
  hide('chineseCard'); hide('mathCard'); hide('noteCard'); hide('submitBtn');
  initDate();
}

// ===== 工具 =====
function show(id) { document.getElementById(id)?.classList.remove('hidden'); }
function hide(id) { document.getElementById(id)?.classList.add('hidden'); }
function setVisible(id, visible) { visible ? show(id) : hide(id); }

function showToast(msg, isError=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (isError ? ' error' : '');
  setTimeout(() => t.classList.add('show'), 10);
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
